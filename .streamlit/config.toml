[server]
headless = true
enableCORS = true
enableXsrfProtection = true
port = 8501
address = "0.0.0.0"
disconnectedSessionTTL = 3600
maxUploadSize = 200

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "minimal"

[theme]
primaryColor = "#4f8ef7"
backgroundColor = "#0d0d1a"
secondaryBackgroundColor = "#111126"
textColor = "#ffffff"
font = "sans serif"
